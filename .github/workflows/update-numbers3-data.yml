name: 更新 Numbers3 真实数据

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-data:
    name: 抓取近100期开奖数据
    runs-on: ubuntu-latest

    steps:
      - name: 检出 develop 分支
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 检查抓取脚本语法
        run: node --check tools/fetch-numbers3.mjs

      - name: 更新近100期 JSON 数据
        run: node tools/fetch-numbers3.mjs

      - name: 校验生成结果
        run: |
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('data/numbers3-latest100.json','utf8')); if (!Array.isArray(data) || data.length !== 100) throw new Error('numbers3-latest100.json must contain 100 records.'); if (!/^第\\d+回$/.test(data[0].draw) || !/^\\d{4}-\\d{2}-\\d{2}$/.test(data[0].date) || !/^\\d{3}$/.test(data[0].number)) throw new Error('Latest record has invalid shape.'); console.log(JSON.stringify({ count: data.length, latest: data[0] }, null, 2));"

      - name: 创建数据更新 PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: automation/update-numbers3-data
          base: develop
          delete-branch: true
          commit-message: 更新近100期开奖数据
          title: 更新近100期开奖数据
          body: |
            ## 修改内容

            - 自动运行 `tools/fetch-numbers3.mjs`
            - 更新 `data/numbers3-latest100.json`

            ## 验证

            - `node --check tools/fetch-numbers3.mjs`
            - 校验 `data/numbers3-latest100.json` 包含 100 条记录
